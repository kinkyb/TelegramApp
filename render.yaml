databases:
  - name: telegram-bot-db
    databaseName: telegrambot
    plan: free

services:
  # Single web service — runs Flask API + Telegram bot together (free plan)
  - type: web
    name: telegram-mini-app-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && chmod +x start.sh
    startCommand: ./start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: telegram-bot-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: OWNER_TELEGRAM_IDS
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: MINI_APP_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
